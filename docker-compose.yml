version: '3.9'

# ⚠️ DEVELOPMENT Docker Compose Configuration
# DO NOT use this for production!
# For production, use: docker-compose -f docker-compose.prod.yml

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: deteleng-db
    restart: always
    environment:
      POSTGRES_USER: deteleng
      POSTGRES_PASSWORD: deteleng123
      POSTGRES_DB: deteleng
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deteleng -d deteleng"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deteleng-network

  # Go Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deteleng-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - JWT_SECRET=deteleng-secret-key-2026
      - ADMIN_EMAIL=admin@deteleng.com
      - ADMIN_PASSWORD=admin123
      - DATABASE_URL=postgres://deteleng:deteleng123@db:5432/deteleng?sslmode=disable
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - deteleng-network
    command: go run ./cmd/api

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deteleng-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - deteleng-network
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
    driver: local

networks:
  deteleng-network:
    driver: bridge
